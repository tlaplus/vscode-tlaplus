name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest, ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'
    - name: Get (latest) TLC
      shell: bash
      run: curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o tools/tla2tools.jar
    - name: Get (latest) CommunityModules
      shell: bash
      run: curl -sL https://github.com/tlaplus/CommunityModules/releases/latest/download/CommunityModules-deps.jar -o tools/CommunityModules-deps.jar
    - name: Install dependencies
      run: |
        npm ci
        npm install -g @vscode/vsce 
    - name: Install LaTeX (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        if ! command -v pdflatex >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base
        fi
        pdflatex --version
    - name: Install LaTeX (macOS)
      if: matrix.os == 'macOS-latest'
      run: |
        if ! command -v pdflatex >/dev/null 2>&1; then
          brew install --cask basictex
          echo "/Library/TeX/texbin" >> "$GITHUB_PATH"
        fi
        /Library/TeX/texbin/pdflatex --version || pdflatex --version
    - name: Install LaTeX (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $miktexBin = 'C:\Program Files\MiKTeX\miktex\bin\x64'
        if (-not (Get-Command pdflatex -ErrorAction SilentlyContinue)) {
          choco install miktex --yes
          Add-Content -Path $env:GITHUB_PATH -Value $miktexBin
          $env:Path = "$miktexBin;$env:Path"
        }
        if (Test-Path "$miktexBin\pdflatex.exe") {
          & "$miktexBin\pdflatex.exe" --version
        } else {
          pdflatex --version
        }
    - name: Build
      run: |
        npm run vscode:prepublish
        vsce package
    - name: Check
      run: npm run lint
    - name: Test Non-Linux
      if: matrix.os != 'ubuntu-latest'
      run: npm test --silent
    - name: Test Linux
      if: matrix.os == 'ubuntu-latest'
      run: xvfb-run --auto-servernum npm test --silent
    - name: Install Playwright browsers
      if: matrix.os == 'ubuntu-latest'
      run: npm run prepare:playwright
    - name: Playwright regression tests
      if: matrix.os == 'ubuntu-latest'
      run: |
        npm run compile
        node scripts/playwright-generate-check-result.js
        npm run test:playwright
    - name: Upload Playwright snapshots
      if: ${{ matrix.os == 'ubuntu-latest' && failure() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: playwright-snapshots
        path: test-results
    - name: Test TLA+ Grammar
      run: npm run test:tlaplus-grammar
    - name: Rename artifact
      if: matrix.os == 'ubuntu-latest'
      run: mv vscode-ide-*.vsix vscode-tlaplus-$(git log -1 --format=%cd --date="format:%Y.%-m.%-d%H%M").vsix
    - name: Upload artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: vscode-tlaplus-ci.vsix
        path: ${{ github.workspace }}/vscode-tlaplus-*.vsix
